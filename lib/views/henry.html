// ─── Belt SVG ────────────────────────────────────────────────
function shade(hex, amt) {
  let h = hex.replace('#','');
  if (h.length === 3) h = h.split('').map(c=>c+c).join('');
  const num = parseInt(h,16);
  let r=(num>>16)&0xff, g=(num>>8)&0xff, b=num&0xff;
  const mix = amt>0?255:0, t=Math.abs(amt);
  r=Math.round(r+(mix-r)*t); g=Math.round(g+(mix-g)*t); b=Math.round(b+(mix-b)*t);
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function BeltSVG({ color, stripe, stripeCount=0, size='ladder', isCurrent=false }) {
  const w = size==='hero' ? 260 : 180;
  const h = size==='hero' ? 90 : 60;
  const isPale = color==='#F5F2E8' || color==='#fff';
  const edge = isPale ? '#C9BE9E' : shade(color,-0.4);
  const shadow = isPale ? '#D4C9A8' : shade(color,-0.25);
  const hl = shade(color,0.22);
  const gid = `g${color.replace('#','')}${stripeCount}${size}`;
  return (
    <svg viewBox="0 0 260 90" width={w} height={h} style={{display:'block', overflow:'visible'}}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={hl}/>
          <stop offset="50%" stopColor={color}/>
          <stop offset="100%" stopColor={shadow}/>
        </linearGradient>
      </defs>
      <path d="M 5 38 L 100 38 L 100 62 L 5 62 Z" fill={`url(#${gid})`} stroke={edge} strokeWidth="1"/>
      <path d="M 160 38 L 255 38 L 255 62 L 160 62 Z" fill={`url(#${gid})`} stroke={edge} strokeWidth="1"/>
      {stripe && Array.from({length:stripeCount}).map((_,i)=>(
        <rect key={i} x={210-i*14} y={38} width={8} height={24}
          fill={stripe} stroke={shade(stripe,-0.3)} strokeWidth="0.5" rx="1"/>
      ))}
      <path d="M 95 30 Q 92 50 95 70 L 165 70 Q 168 50 165 30 Z"
        fill={`url(#${gid})`} stroke={edge} strokeWidth="1"/>
      <path d="M 100 35 Q 98 50 100 65 L 160 65 Q 162 50 160 35 Z"
        fill="none" stroke={shadow} strokeWidth="0.8" opacity="0.5"/>
      <ellipse cx="130" cy="50" rx="12" ry="18" fill="none" stroke={edge} strokeWidth="1" opacity="0.4"/>
      {isCurrent && (
        <circle cx="130" cy="10" r="6" fill="#E63946">
          <animate attributeName="r" values="6;8;6" dur="1.2s" repeatCount="indefinite"/>
        </circle>
      )}
    </svg>
  );
}

function BandSVG({ color, size=34 }) {
  const darker = shade(color,-0.3);
  const hl = shade(color,0.25);
  const gid = `bd${color.replace('#','')}`;
  return (
    <svg viewBox="0 0 100 36" width={size*2.3} height={size}>
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">

      <rect x="2" y="12" width="96" height="2" rx="1" fill={hl} opacity="0.6"/>

}

        </div>

      <div style={{position:'relative'}}>
        <div style={{position:'absolute', left:22, top:30, bottom:30, width:4,
          background:`repeating-linear-gradient(to bottom, ${T.accent} 0 8px, transparent 8px 16px)`,

          const earned = i <= currentIdx;
          const isNext = i === currentIdx + 1;
          return (
            <div key={belt.id} onClick={()=>onOpenBelt(belt)}

                position:'relative', zIndex:1,
                display:'flex', alignItems:'center', gap:12,
                padding:'10px 12px', marginBottom:8, borderRadius:20,
                background: belt.isCurrent ? (tone==='ninja'?'rgba(230,57,70,0.15)':'#FFEEF0')

                  : isNext ? '2px dashed #3B7FD8'

                cursor:'pointer', opacity: earned||isNext?1:0.5,

              <div style={{
                width:28, height:28, borderRadius:14,
                background: earned ? '#E63946' : (tone==='ninja'?'#2A2B35':'#EFE9DA'),
                color: earned ? '#fff' : (tone==='ninja'?'#8A8A95':'#8A7F65'),
                display:'flex', alignItems:'center', justifyContent:'center',
                fontFamily:"'Fredoka', system-ui", fontWeight:600, fontSize:14,
                flexShrink:0,
              }}>{earned ? '✓' : i+1}</div>
              <div style={{flexShrink:0}}>

      border: celebrate?'2.5px solid #E8B84A':`1.5px solid ${cardBorder}`,
      position:'relative',
      boxShadow: celebrate?'0 6px 18px rgba(232,184,74,0.25)':'none',
    }}>
      {celebrate && (
        <div style={{
          position:'absolute', top:-10, right:14,
          background:'#E63946', color:'#fff', padding:'4px 10px', borderRadius:10,
          fontFamily:"'Fredoka', system-ui", fontWeight:600, fontSize:11,
          letterSpacing:0.5, textTransform:'uppercase',
        }}>New!</div>
      )}
      <div style={{display:'flex', alignItems:'center', gap:14}}>
        <BandSVG color={band.color}/>
        <div style={{flex:1}}>
          <div style={{fontFamily:"'Fredoka', system-ui", fontWeight:600, fontSize:16, color:textCol}}>
            {band.label}
          </div>
          <div style={{fontSize:13, color:mutedCol, marginTop:2}}>{band.desc}</div>
        </div>
        <div style={{fontFamily:"'Fredoka', system-ui", fontWeight:600, fontSize:20, color:textCol}}>
          {band.earned}
        </div>
      </div>
      <div style={{display:'flex', gap:6, marginTop:12, flexWrap:'wrap'}}>
        {Array.from({length:Math.max(band.earned,band.total)}).map((_,i)=>{
          const filled = i < band.earned;
          return <div key={i} style={{
            width:16, height:16, borderRadius:8,
            background: filled ? band.color : 'transparent',
            border:`2px solid ${filled ? band.color : '#DDD3BE'}`,
          }}/>;
        })}
      </div>
      {progress && (
        <div style={{fontSize:12, color:'#3B7FD8', fontWeight:700, marginTop:8}}>
          {band.earned >= band.total ? '⭐ Ready for a gold!' : `${band.total-band.earned} more until next gold`}
        </div>
      )}
    </div>
  );
}

function HowRow({ color, text, last, tone }) {
  const border = tone==='ninja' ? '#2A2B35' : '#F4EEDC';
  const txt = tone==='ninja' ? '#D0D0D8' : '#3A4660';
  return (
    <div style={{display:'flex', alignItems:'center', gap:10, padding:'8px 0',
      borderBottom: last?'none':`1px solid ${border}`}}>
      <div style={{width:28, height:10, borderRadius:3, background:color, flexShrink:0}}/>
      <div style={{fontSize:14, color:txt}}>{text}</div>
    </div>
  );
}

// ─── Quest Screen ────────────────────────────────────────────
function QuestScreen({ tone }) {
  const [done, setDone] = useState(()=>{
    try { return JSON.parse(localStorage.getItem('henry-quest')||'[]'); } catch { return []; }
  });
  const [reward, setReward] = useState(false);

  useEffect(()=>{
    localStorage.setItem('henry-quest', JSON.stringify(done));
    if (done.length === QUEST.steps.length && !reward) {
      setTimeout(()=>setReward(true), 300);
    }
  }, [done]);

  const toggle = (id) => setDone(done.includes(id) ? done.filter(d=>d!==id) : [...done, id]);
  const reset = () => { setDone([]); setReward(false); };

  const textCol = tone==='ninja' ? '#F0F0F5' : '#1C2541';
  const mutedCol = tone==='ninja' ? 'rgba(255,255,255,0.55)' : '#5A6B85';
  const cardBg = tone==='ninja' ? '#1C1D24' : '#fff';
  const cardBorder = tone==='ninja' ? '#2A2B35' : '#EFE9DA';

  return (
    <div style={{padding:'4px 16px 120px'}}>
      <div style={{
        background:'linear-gradient(135deg, #E63946 0%, #C1272D 100%)',
        borderRadius:24, padding:'20px 22px', margin:'8px 0 20px',
        color:'#fff', boxShadow:'0 8px 24px rgba(230,57,70,0.3)',
      }}>
        <div style={{fontSize:42, lineHeight:1}}>⚔️</div>
        <div style={{fontFamily:"'Fredoka', system-ui", fontWeight:600, fontSize:22, marginTop:8}}>
          {QUEST.title}
        </div>
        <div style={{fontSize:14, marginTop:4, opacity:0.95}}>{QUEST.subtitle}</div>
      </div>

      {QUEST.steps.map((s, i)=>{
        const isDone = done.includes(s.id);
        return (
          <div key={s.id} onClick={()=>toggle(s.id)}
            style={{
              background: isDone ? (tone==='ninja'?'rgba(76,175,90,0.15)':'#E8F5E9') : cardBg,
              border: isDone ? '2px solid #4CAF5A' : `1.5px solid ${cardBorder}`,
              borderRadius:20, padding:'16px 18px', marginBottom:10,
              display:'flex', alignItems:'center', gap:14, cursor:'pointer',
              transition:'all 0.2s',
            }}>
            <div style={{
              width:44, height:44, borderRadius:22,
              background: isDone ? '#4CAF5A' : '#FFF4D6',
              display:'flex', alignItems:'center', justifyContent:'center',
              fontSize:22, flexShrink:0, color:'#fff',
            }}>{isDone ? '✓' : s.icon}</div>
            <div style={{flex:1}}>
              <div style={{
                fontFamily:"'Fredoka', system-ui", fontWeight:500, fontSize:16,
                color: isDone ? '#2E7D33' : textCol,
              }}>Step {i+1}</div>
              <div style={{fontSize:15, color: isDone ? '#2E7D33' : (tone==='ninja'?'#D0D0D8':'#3A4660'), marginTop:2}}>
                {s.text}
              </div>
            </div>
          </div>
        );
      })}

      <div style={{
        background:cardBg, borderRadius:20, padding:18, marginTop:8,
        border:'2px dashed #E8B84A', textAlign:'center',
      }}>
        <div style={{fontSize:48, filter: done.length === QUEST.steps.length ? 'none' : 'grayscale(1) opacity(0.3)'}}>🏅</div>
        <div style={{fontFamily:"'Fredoka', system-ui", fontWeight:600, fontSize:16, color:textCol, marginTop:6}}>
          {done.length === QUEST.steps.length ? 'YOU DID IT, HENRY!' : `${QUEST.steps.length - done.length} to go...`}
        </div>
        {done.length > 0 && (
          <button onClick={reset} style={{
            marginTop:12, padding:'8px 18px', background:'transparent',
            color:mutedCol, border:`1.5px solid ${cardBorder}`, borderRadius:12,
            fontFamily:"'Nunito', system-ui", fontWeight:600, fontSize:13, cursor:'pointer',
          }}>Start over</button>
        )}
      </div>

      {reward && (
        <div onClick={()=>setReward(false)} style={{
          position:'absolute', inset:0, zIndex:100,
          background:'rgba(0,0,0,0.55)',
          display:'flex', alignItems:'center', justifyContent:'center', padding:20,
        }}>
          <div style={{
            background:'#FBF7EC', borderRadius:28, padding:'32px 24px',
            textAlign:'center', maxWidth:280,
            animation:'pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)',
          }}>
            <div style={{fontSize:80, animation:'spin 1s ease'}}>🏅</div>
            <div style={{fontFamily:"'Fredoka', system-ui", fontWeight:600, fontSize:22, color:'#1C2541', margin:'12px 0 4px'}}>
              STICKER EARNED!
            </div>
            <div style={{fontSize:15, color:'#5A6B85', marginBottom:20}}>
              High five, Henry! 🙌
            </div>
            <button onClick={()=>setReward(false)} style={{
              padding:'12px 24px', background:'#E63946', color:'#fff',
              border:'none', borderRadius:14,
              fontFamily:"'Fredoka', system-ui", fontWeight:500, fontSize:16, cursor:'pointer',
            }}>Awesome!</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── Tab Bar ─────────────────────────────────────────────────
function TabBar({ tab, setTab, tone, labels, accent }) {
  const items = [
    { id:'ladder', label:labels.ladder, icon:'🥋' },
    { id:'bands',  label:labels.bands,  icon:'🏆' },
    { id:'quest',  label:labels.quest,  icon:'⚔️' },
  ];
  const bg = tone==='ninja' ? '#14151A' : '#fff';
  const border = tone==='ninja' ? '#2A2B35' : '#EFE9DA';
  const inactive = tone==='ninja' ? '#6B6B7A' : '#9A8F78';
  return (
    <div style={{
      position:'absolute', bottom:0, left:0, right:0,
      background:bg, borderTop:`1px solid ${border}`,
      padding:'10px 8px 20px', display:'flex', justifyContent:'space-around', zIndex:50,
    }}>
      {items.map(it => {
        const active = tab === it.id;
        return (
          <button key={it.id} onClick={()=>setTab(it.id)} style={{
            flex:1, background:'transparent', border:'none',
            padding:'6px 4px', cursor:'pointer',
            display:'flex', flexDirection:'column', alignItems:'center', gap:2,
            color: active ? accent : inactive,
            fontFamily:"'Fredoka', system-ui", fontWeight:600, fontSize:12,
          }}>
            <div style={{fontSize:22,
              filter: active ? 'none' : 'grayscale(0.4) opacity(0.7)',
              animation: active ? 'float 2s ease-in-out infinite' : 'none',
            }}>{it.icon}</div>
            <div>{it.label}</div>
          </button>
        );
      })}
    </div>
  );
}

// ─── App ─────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState(()=>localStorage.getItem('henry-tab') || 'ladder');
  const [belt, setBelt] = useState(null);
  const [tone, setTone] = useState(window.TWEAKS?.tone || 'playful');
  const [tweaksOpen, setTweaksOpen] = useState(false);

  useEffect(()=>{ localStorage.setItem('henry-tab', tab); }, [tab]);

  useEffect(()=>{
    const onMsg = (e)=>{
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweaksOpen(true);
      if (d.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type:'__edit_mode_available' }, '*');
    return ()=>window.removeEventListener('message', onMsg);
  }, []);

  useEffect(()=>{
    document.body.style.background = TONES[tone].bodyBg;
  }, [tone]);

  const T = TONES[tone];

  const setTweak = (v) => {
    window.parent.postMessage({ type:'__edit_mode_set_keys', edits:{ tone: v } }, '*');
    setTone(v);
  };

  return (
    <div className="stage" data-screen-label="Henry's Belt Journey">
      <div className="brand">
        <div className="title">Henry's Belt Journey</div>
        <div className="sub">Mastery Martial Arts · Little Dragons</div>
      </div>

      <div className="device" style={{background:T.bg}}>
        <div className="island"/>
        <div className="statusbar" style={{color:tone==='ninja'?'#F0F0F5':'#1C2541'}}>
          <span>9:41</span>
          <span style={{display:'flex', gap:6, alignItems:'center', fontSize:13}}>
            <span>●●●</span>
            <span style={{border:`1.5px solid currentColor`, width:22, height:11, borderRadius:2, padding:1, display:'inline-flex'}}>
              <span style={{background:'currentColor', flex:1, borderRadius:1}}/>
            </span>
          </span>
        </div>

        <div style={{
          paddingTop:62, padding:'62px 20px 14px',
          background:T.hero,
          borderBottom: tone==='ninja' ? '1px solid #2A2A35' : '1px solid #EFE9DA',
        }}>
          <div style={{fontFamily:"'Fredoka', system-ui", fontWeight:600, fontSize:26, color:T.heroText}}>
            {T.greeting}
          </div>
          <div style={{fontSize:14, color:T.subText, marginTop:4}}>
            {T.sub}
          </div>
        </div>

        <div style={{
          position:'absolute', top:138, left:0, right:0, bottom:64,
          overflowY:'auto', background:T.bg,
        }}>
          {tab === 'ladder' && <LadderScreen onOpenBelt={setBelt} T={T} tone={tone}/>}
          {tab === 'bands'  && <BandsScreen tone={tone}/>}
          {tab === 'quest'  && <QuestScreen tone={tone}/>}
        </div>

        <TabBar tab={tab} setTab={setTab} tone={tone} labels={T.tabs} accent={T.accent}/>

        {belt && <BeltDetail belt={belt} onClose={()=>setBelt(null)} tone={tone}/>}

        <div className="home" style={{background:tone==='ninja'?'rgba(255,255,255,0.5)':'rgba(0,0,0,0.25)'}}/>
      </div>

      {tweaksOpen && (
        <div style={{
          position:'fixed', bottom:20, right:20, zIndex:9999,
          background:'#fff', borderRadius:18, padding:18, width:240,
          boxShadow:'0 20px 60px rgba(0,0,0,0.3)',
          fontFamily:"'Nunito', system-ui",
        }}>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:12}}>
            <div style={{fontFamily:"'Fredoka', system-ui", fontWeight:600, fontSize:16}}>Tweaks</div>
            <div style={{fontSize:12, color:'#999'}}>Live</div>
          </div>
          <div style={{fontSize:12, color:'#666', marginBottom:6, fontWeight:700}}>TONE</div>
          {Object.entries(TONES).map(([k,v])=>(
            <button key={k} onClick={()=>setTweak(k)} style={{
              display:'block', width:'100%', textAlign:'left',
              padding:'10px 12px', marginBottom:6,
              background: tone===k?'#1C2541':'#F4EFE4',
              color: tone===k?'#fff':'#1C2541',
              border:'none', borderRadius:10, cursor:'pointer',
              fontFamily:"'Nunito', system-ui", fontWeight:600, fontSize:14,
            }}>{v.label}</button>
          ))}
        </div>
      )}

      <div className="hint">tap a belt · switch tabs · finish the quest to earn a sticker</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
